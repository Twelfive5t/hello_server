apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      allowAsRecordingRulesTarget: true
      prometheusType: Prometheus
      prometheusVersion: 3.11.0
      cacheLevel: High
      disableRecordingRules: false
      seriesEndpoint: false
      timeInterval: 15s
      incrementalQueryOverlapWindow: 10m  # 增量查询时窗口重叠 10m，防止时间边界数据缺失
      exemplarTraceIdDestinations:
        - datasourceUid: tempo
          name: traceID  # 指标面板中点击 exemplar 数据点，可跳转到 Tempo 对应 trace
