groups:
  - name: hello_server
    rules:
      - alert: ServiceDown
        expr: absent(rpc_server_requests_total)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "hello_server is down"
          description: "No gRPC metrics received from hello_server for more than 1 minute."

      - alert: HighErrorRate
        expr: sum(rate(rpc_server_requests_total{rpc_grpc_status_code!="0"}[5m])) / sum(rate(rpc_server_requests_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High gRPC error rate"
          description: "gRPC error rate is above 5% for the last 5 minutes."

      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, sum by (le) (rate(rpc_server_duration_milliseconds_bucket[5m]))) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High gRPC P99 latency"
          description: "P99 gRPC request latency exceeds 1000ms for the last 5 minutes."
