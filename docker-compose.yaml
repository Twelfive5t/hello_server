services:
  server:
    image: ${PRODUCT_IMAGE}
    restart: always
    privileged: true
    environment:
      - LD_LIBRARY_PATH=/workspace
      - TELEMETRY_OTLP_ENDPOINT=alloy:4317
    volumes:
      - /const:/const
      - /user_profiles:/user_profiles
      - /corefile:/corefile
      - /var/log/spdlog:/workspace/logs
    command: ./main
    ports:
      - "50051:50051"
    depends_on:
      - alloy
    healthcheck:
      test: ["CMD", "grpc_health_probe", "--addr", "127.0.0.1:50051", "--service", ""]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 3s
