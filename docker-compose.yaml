services:
  # 编译环境
  service:
    image: ${PRODUCT_IMAGE}
    restart: always
    privileged: true
    environment:
      - LD_LIBRARY_PATH=/workspace
      - TELEMETRY_OTLP_ENDPOINT=alloy:4317
    volumes:
      - /const:/const
      - /user_profiles:/user_profiles
      - /corefile:/corefile
      - /var/log/spdlog:/workspace/logs
    command: ./main
    ports:
      - "50051:50051"
    depends_on:
      - alloy
    healthcheck:
      test: ["CMD", "grpc_health_probe", "--addr", "127.0.0.1:50051", "--service", ""]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 3s

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    privileged: true
    volumes:
      - ./config/alloy:/etc/alloy
      - /var/log/spdlog:/var/log/spdlog:ro
      - alloy_data:/var/lib/alloy
    ports:
      - "4317:4317"     # OTLP gRPC (面向应用)
      - "4318:4318"     # OTLP HTTP (面向应用)
      - "12345:12345"   # Alloy UI
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy
      - /etc/alloy/config.alloy
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: prometheus
    privileged: true
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
      - --enable-feature=exemplar-storage
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    privileged: true
    volumes:
      - ./config/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command:
      - -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    privileged: true
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    command:
      - -config.file=/etc/tempo/tempo.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    privileged: true
    environment:
      - TZ=CST-8
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"     # Grafana UI
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  alloy_data:
  loki_data:
  prometheus_data:
  tempo_data:
  grafana_data:
